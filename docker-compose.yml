services:
  db:
    image: postgres:16-alpine
    container_name: qualitrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qualitrack
      POSTGRES_USER: qualitrack_user
      POSTGRES_PASSWORD: QualiTrack@2025!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qualitrack_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualitrack_user -d qualitrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: qualitrack_minio
    restart: unless-stopped
    ports: 
      - "9000:9000" 
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: QualiTrack@Minio2025
    volumes:
      - minio_data:/data
    command: server /data --console-adress ":9001"
    networks:
      - qualitrack_net
  api:
    build: .
    container_name: qualitrack_api
    restart: unless-stopped
    ports:
      - "5144:5144"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5144
      - ConnectionStrings__Supabase=Host=db;Port=5432;Database=qualitrack;Username=qualitrack_user;Password=QualiTrack@2025!
      - Jwt__Key=${JWT_SECRET}
      - Jwt__Issuer=QualiTrack
      - Jwt__Audience=QualiTrack
      - S3__Endpoint=http://minio:9000
      - S3__BucketName=qualitrack
      - S3__AccessKey=minioadmin
      - S3__SecretAccessKey=QualiTrack@Minio2025
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - qualitrack_net

volumes:
  postgres_data:
  minio_data:
  uploads_data:
  dataprotection_keys:

networks:
  qualitrack_net:
    driver: bridge
